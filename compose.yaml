services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      # Host Port : Container Port
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
        
      # If you want to use private registries, you need to share the auth file with Dockge:
      # - /root/.docker/:/root/.docker

      # Stacks Directory
      # ⚠️ READ IT CAREFULLY. If you did it wrong, your data could end up writing into a WRONG PATH.
      # ⚠️ 1. FULL path only. No relative path (MUST)
      # ⚠️ 2. Left Stacks Path === Right Stacks Path (MUST)
      - /opt/stacks:/opt/stacks
    environment:
      # Tell Dockge where is your stacks directory
      - DOCKGE_STACKS_DIR=/opt/stacks
      # Optional: enable enhanced pull mode with native docker image storage
      # - DOCKGE_ENHANCED_PULL_ENABLED=true
      # - DOCKGE_ENHANCED_PULL_CONCURRENCY=3
      # - DOCKGE_ENHANCED_PULL_RETRIES=2
      # - DOCKGE_ENHANCED_PULL_MIRRORS=docker.m.daocloud.io,dockerproxy.cn
      # - DOCKGE_ENHANCED_PULL_MIRROR_MAP={"ghcr.io":["ghcr.nju.edu.cn"]}
